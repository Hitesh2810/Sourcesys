<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Handling</title>

    <style>
        body {
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
            background-color: violet;
            transition: background-color 0.5s;
        }

        h1 {
            font-size: 60px;
        }

        button {
            padding: 12px 25px;
            margin: 10px;
            border: 2px solid black;
            font-size: 16px;
            cursor: pointer;
            border-radius: 6px;
            color: black;
            font-weight: bold;
        }

        .inc { background-color: #69B59A; }
        .dec { background-color: #BD6191; }
        .reset { background-color: violet; }

        button:hover {
            transform: scale(1.1);
            opacity: 0.8;
        }
    </style>
</head>

<body>

    <h2>Event Handling Demo</h2>
    <h1 id="count">0</h1>

    <button class="inc" id="incBtn">Increment (+)</button>
    <button class="dec" id="decBtn">Decrement (-)</button>
    <button class="reset" id="resetBtn">Reset (R)</button>

    <p>Keyboard: ↑ Increment | ↓ Decrement | R Reset</p>

    <script>
        let count = 0;

        const countDisplay = document.getElementById("count");
        const body = document.body;

        function updateDisplay(color) {
            countDisplay.innerText = count;
            body.style.backgroundColor = color;
        }

        document.getElementById("incBtn").addEventListener("click", function () {
            count++;
            updateDisplay("#69B59A");
        });

        document.getElementById("decBtn").addEventListener("click", function () {
            count--;
            updateDisplay("#BD6191");
        });

        document.getElementById("resetBtn").addEventListener("click", function () {
            count = 0;
            updateDisplay("violet");
        });

        document.addEventListener("keydown", function (event) {
            if (event.key === "ArrowUp") {
                count++;
                updateDisplay("#69B59A");
            } 
            else if (event.key === "ArrowDown") {
                count--;
                updateDisplay("#BD6191");
            } 
            else if (event.key === "r" || event.key === "R") {
                count = 0;
                updateDisplay("violet");
            }
        });

        document.getElementById("count").addEventListener("mouseover", function () {
            this.innerText = "Value: " + count;
        });

        document.getElementById("count").addEventListener("mouseout", function () {
            this.innerText = count;
        });

    </script>

</body>
</html>
