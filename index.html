<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeadHub | Management</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="app-container">
        <h2>LeadHub</h2>

        <!-- Form Section -->
        <div class="form-container">
            <input type="text" id="name" placeholder="Name">
            <input type="email" id="email" placeholder="Email">
            <input type="text" id="business" placeholder="Business Unit">
            <button id="save-btn" onclick="createOrUpdateLead()">Save Lead</button>
        </div>

        <!-- Table Section -->
        <div class="table-card">
            <h3>Active Leads</h3>
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Business Unit</th>
                        <th class="text-center">Actions</th>
                    </tr>
                </thead>
                <tbody id="leadTableBody">
                    <!-- JavaScript will inject <tr> elements here -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
